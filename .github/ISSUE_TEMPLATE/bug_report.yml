name: Bug report
description: Report a reproducible functional bug (non-security)
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting.
        For security vulnerabilities, do not open a public issue.
        Please use private channels in SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide exact steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, extension version/tag, commit hash
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I confirmed this is not a security vulnerability disclosure.
          required: true
